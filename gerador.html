    <script>
        // Ler parâmetros da URL (A mágica da extensão acontecendo aqui)
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            
            // Preenche os campos automaticamente se a extensão enviou os dados
            if (params.has('titulo')) document.getElementById('titulo').value = params.get('titulo');
            if (params.has('imagem')) document.getElementById('imagem').value = params.get('imagem');
            if (params.has('preco')) document.getElementById('precoAtual').value = params.get('preco');
            if (params.has('precoAntigo')) document.getElementById('precoAntigo').value = params.get('precoAntigo'); // NOVO!
            if (params.has('link')) document.getElementById('link').value = params.get('link'); // NOVO!
        };

        function gerarEBaixar() {
            const novoProduto = {
                id: Date.now(),
                titulo: document.getElementById('titulo').value.trim(),
                imagem: document.getElementById('imagem').value.trim(),
                precoAntigo: document.getElementById('precoAntigo').value.trim() || "R$ 0,00",
                precoAtual: document.getElementById('precoAtual').value.trim(),
                link: document.getElementById('link').value.trim(),
                categoria: document.getElementById('categoria').value,
                destaque: document.getElementById('destaque').value.trim() || "Oferta",
                expiraEm: document.getElementById('expiraEm').value || null,
                recomendado: document.getElementById('recomendado').checked
            };

            if (!novoProduto.titulo || !novoProduto.link) {
                alert('Título e Link de Afiliado são obrigatórios!');
                return;
            }

            let listaProdutos = [];
            const jsonAtualTexto = document.getElementById('jsonAtual').value.trim();
            
            if (jsonAtualTexto) {
                try {
                    listaProdutos = JSON.parse(jsonAtualTexto);
                    if (!Array.isArray(listaProdutos)) throw new Error();
                } catch (e) {
                    alert('Erro: O JSON atual está inválido.');
                    return;
                }
            }

            listaProdutos.push(novoProduto);
            const jsonFinal = JSON.stringify(listaProdutos, null, 4);

            const blob = new Blob([jsonFinal], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'produtos.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
